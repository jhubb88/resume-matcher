name: Deploy to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy resume-matcher
        run: |
          aws s3 sync . s3://jimmy-resume-matcher/ --delete \
            --exclude ".git/*" --exclude ".github/*" \
            --exclude "*.md" --exclude "LICENSE" --exclude ".gitignore" \
            --exclude "deploy.sh" --exclude "lambda_function.py" \
            --exclude "requirements.txt" --exclude "build/*" --exclude "lambda.zip"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E3H0XAJDR3BQG1 --paths "/*"

      - name: Check if Lambda code or deps changed
        id: lambda_diff
        run: |
          if [ "$(git rev-list --count HEAD)" -eq 1 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Initial commit — deploying Lambda"
          elif git diff --name-only HEAD^ HEAD | grep -qE "^(lambda_function\.py|requirements\.txt)$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Lambda code or requirements changed — deploying Lambda"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Lambda code and requirements unchanged — skipping Lambda deploy"
          fi

      - name: Build and deploy Lambda
        if: steps.lambda_diff.outputs.changed == 'true'
        run: |
          mkdir -p build
          pip install -r requirements.txt -t build/ --quiet
          cp lambda_function.py build/
          cd build
          zip -rq ../lambda.zip .
          cd ..

          ZIP_FILE_COUNT=$(unzip -l lambda.zip | tail -1 | awk '{print $2}')
          echo "Zip contains $ZIP_FILE_COUNT files"
          if [ "$ZIP_FILE_COUNT" -lt 100 ]; then
            echo "❌ Build produced suspiciously small package ($ZIP_FILE_COUNT files). Expected ~1900+."
            exit 1
          fi

          aws lambda update-function-code \
            --function-name jimmy-resume-matcher \
            --zip-file fileb://lambda.zip \
            --region us-east-1 \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name jimmy-resume-matcher \
            --region us-east-1

          rm -rf build lambda.zip

      - name: CORS smoke test
        run: |
          API_URL="https://1kj7anef1b.execute-api.us-east-1.amazonaws.com/prod/analyze"
          ORIGIN="https://resume-matcher.jimmyhubbard2.cc"

          RESPONSE=$(curl -s -i -X OPTIONS "$API_URL" \
            -H "Origin: $ORIGIN" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: content-type,x-api-key")

          echo "$RESPONSE"

          ALLOW_HEADERS=$(echo "$RESPONSE" | grep -i "access-control-allow-headers" | tr -d '\r')

          if echo "$ALLOW_HEADERS" | grep -qi "x-api-key"; then
            echo "✅ CORS preflight allows x-api-key"
          else
            echo "❌ CORS preflight MISSING x-api-key in Access-Control-Allow-Headers"
            echo "Response was: $ALLOW_HEADERS"
            exit 1
          fi
